  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    // ========== 아이콘 (lucide SVG 인라인) ==========

    const IconSparkles = (p) => <Icon {...p} d={<><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></>} />;
    const IconClock = (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />;
    const IconCheck = (p) => <Icon {...p} d={<><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></>} />;
    const IconCircle = (p) => <Icon {...p} d={<circle cx="12" cy="12" r="10"/>} />;
    const IconPlay = (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></>} />;
    const IconList = (p) => <Icon {...p} d={<><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></>} />;
    const IconChart = (p) => <Icon {...p} d={<><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M7 16h8"/><path d="M7 11h12"/><path d="M7 6h3"/></>} />;
    const IconX = (p) => <Icon {...p} d={<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>} />;
    const IconPlus = (p) => <Icon {...p} d={<><path d="M5 12h14"/><path d="M12 5v14"/></>} />;
    const IconKey = (p) => <Icon {...p} d={<><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></>} />;
    const IconSettings = (p) => <Icon {...p} d={<><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>} />;
    const IconTrash = (p) => <Icon {...p} d={<><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>} />;
    const IconLoader = (p) => <Icon {...p} d={<path d="M21 12a9 9 0 1 1-6.219-8.56"/>} className={(p.className || "w-4 h-4") + " animate-spin"} />;

    // ========== localStorage 헬퍼 ==========
    const STORAGE = {
      apiKey: 'lupl_planner_api_key',
      tasks: 'lupl_planner_tasks',
      meta: 'lupl_planner_meta',
    };
    const load = (key, fallback) => {
      try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
      catch { return fallback; }
    };
    const save = (key, value) => {
      try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
    };

    // ========== 시간 유틸 ==========
    const formatTime = (baseDate, offsetMin) => {
      const t = new Date(baseDate.getTime() + offsetMin * 60000);
      return `${String(t.getHours()).padStart(2, '0')}:${String(t.getMinutes()).padStart(2, '0')}`;
    };
    const getBaseTime = (mode, scheduledTime) => {
      if (mode === 'now') return new Date();
      const [h, m] = scheduledTime.split(':').map(Number);
      const d = new Date();
      d.setHours(h, m, 0, 0);
      return d;
    };

    // ========== AI 분석 (OpenAI GPT-4o-mini) ==========
    async function analyzeTasks(rawText, apiKey) {
      const taskList = rawText.split('\n').map(s => s.trim()).filter(Boolean);
      if (taskList.length === 0) throw new Error('할 일이 비어있어요');

      const systemPrompt = `당신은 일정 최적화 전문가입니다. 사용자가 입력한 할 일 목록을 분석해 각 작업의 소요시간(duration)과 능동시간(activeTime), 병렬 가능 여부(parallel)를 판단합니다.

규칙:
- duration: 작업이 시작되어 완료될 때까지 걸리는 총 시간(분)
- activeTime: 그중 사람이 손/주의를 직접 써야 하는 시간(분). duration보다 작거나 같음
- parallel: activeTime < duration이면 true (예: 빨래 돌리기는 2분 세팅 후 28분 자동 → parallel: true)
- 단독 집중 작업(글쓰기, 청소, 회의 등)은 parallel: false, activeTime = duration

순서 정렬 원칙:
1. parallel 작업을 먼저 시작해서 대기시간 동안 다른 작업을 끼워넣음
2. activeTime이 짧은 parallel 작업부터 → 그 대기시간 동안 단독 작업 처리
3. startMin은 각 작업의 시작 시점(분, 0부터). 병렬 작업의 대기 구간에 다른 작업이 들어갈 수 있음

반드시 JSON 배열만 반환. 마크다운, 설명, 백틱 금지. 형식:
[{"name":"작업명","duration":30,"activeTime":2,"parallel":true,"startMin":0}, ...]`;

      const userPrompt = `다음 할 일 목록을 분석해서 최적 순서의 JSON 배열로 반환해주세요:\n${taskList.map((t,i) => `${i+1}. ${t}`).join('\n')}`;

      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`,
        },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          messages: [
            { role: 'system', content: systemPrompt },
            { role: 'user', content: userPrompt },
          ],
          temperature: 0.3,
          response_format: { type: 'json_object' },
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `API 오류 (${res.status})`);
      }

      const data = await res.json();
      const content = data.choices[0].message.content;
      // JSON 객체 안에 배열이 들어있을 수 있으니 유연하게 파싱
      let parsed;
      try {
        parsed = JSON.parse(content);
        if (!Array.isArray(parsed)) {
          // 객체에서 배열 필드 찾기
          const arrField = Object.values(parsed).find(v => Array.isArray(v));
          if (arrField) parsed = arrField;
          else throw new Error('JSON 배열 형식이 아니에요');
        }
      } catch (e) {
        throw new Error('AI 응답을 해석할 수 없어요. 다시 시도해주세요.');
      }

      // 검증 + ID 부여
      return parsed.map((t, i) => ({
        id: Date.now() + i,
        name: String(t.name || `작업 ${i+1}`),
        duration: Math.max(1, Number(t.duration) || 10),
        activeTime: Math.max(1, Math.min(Number(t.activeTime) || 10, Number(t.duration) || 10)),
        parallel: Boolean(t.parallel),
        startMin: Math.max(0, Number(t.startMin) || 0),
        status: 'todo',
      }));
    }

    // ========== API 키 입력 모달 ==========
    function ApiKeyModal({ open, onClose, onSave, currentKey }) {
      const [value, setValue] = useState(currentKey || '');
      const [show, setShow] = useState(false);

      useEffect(() => { if (open) setValue(currentKey || ''); }, [open, currentKey]);
      if (!open) return null;

      return (
        <div className="fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-4" onClick={onClose}>
          <div className="bg-white rounded-2xl w-full max-w-md p-5 sm:p-6" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4">
              <div className="flex items-center gap-2">
                <IconKey className="w-5 h-5 text-stone-700" />
                <h2 className="text-base font-semibold">OpenAI API 키 설정</h2>
              </div>
              <button onClick={onClose} className="p-1 hover:bg-stone-100 rounded-lg">
                <IconX className="w-4 h-4" />
              </button>
            </div>

            <p className="text-xs text-stone-500 mb-3 leading-relaxed">
              AI 분석 기능을 쓰려면 OpenAI API 키가 필요해요. 키는 이 브라우저에만 저장되고 외부로 전송되지 않습니다.
              <br /><a href="https://platform.openai.com/api-keys" target="_blank" rel="noreferrer" className="text-emerald-600 underline mt-1 inline-block">API 키 발급받기 →</a>
            </p>

            <div className="relative">
              <input
                type={show ? 'text' : 'password'}
                value={value}
                onChange={e => setValue(e.target.value)}
                placeholder="sk-..."
                className="w-full px-3 py-2.5 pr-16 text-sm border border-stone-200 rounded-xl focus:outline-none focus:border-stone-900 font-mono"
              />
              <button
                onClick={() => setShow(!show)}
                className="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-stone-500 px-2 py-1 hover:bg-stone-100 rounded"
              >
                {show ? '숨기기' : '보기'}
              </button>
            </div>

            <div className="flex items-center gap-2 mt-4">
              <button
                onClick={onClose}
                className="flex-1 py-2.5 text-sm border border-stone-200 rounded-xl hover:bg-stone-50"
              >
                취소
              </button>
              <button
                onClick={() => { onSave(value.trim()); onClose(); }}
                disabled={!value.trim()}
                className="flex-1 py-2.5 text-sm bg-stone-900 text-white rounded-xl hover:bg-stone-800 disabled:opacity-40 disabled:cursor-not-allowed"
              >
                저장
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ========== 작업 편집 모달 ==========
    function EditTaskModal({ task, onClose, onSave }) {
      const [name, setName] = useState(task?.name || '');
      const [duration, setDuration] = useState(task?.duration || 10);
      const [activeTime, setActiveTime] = useState(task?.activeTime || 10);
      const [parallel, setParallel] = useState(task?.parallel || false);

      if (!task) return null;

      const handleSave = () => {
        const d = Math.max(1, Number(duration) || 1);
        const a = Math.max(1, Math.min(Number(activeTime) || 1, d));
        onSave({
          ...task,
          name: name.trim() || '제목 없음',
          duration: d,
          activeTime: parallel ? a : d,
          parallel: parallel && a < d,
        });
        onClose();
      };

      return (
        <div className="fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-4" onClick={onClose}>
          <div className="bg-white rounded-2xl w-full max-w-md p-5 sm:p-6" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4">
              <h2 className="text-base font-semibold">작업 수정</h2>
              <button onClick={onClose} className="p-1 hover:bg-stone-100 rounded-lg">
                <IconX className="w-4 h-4" />
              </button>
            </div>

            <div className="space-y-3">
              <div>
                <label className="text-xs font-medium text-stone-700 block mb-1">작업명</label>
                <input
                  type="text"
                  value={name}
                  onChange={e => setName(e.target.value)}
                  className="w-full px-3 py-2 text-sm border border-stone-200 rounded-xl focus:outline-none focus:border-stone-900"
                />
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="text-xs font-medium text-stone-700 block mb-1">총 소요(분)</label>
                  <input
                    type="number" min="1"
                    value={duration}
                    onChange={e => setDuration(e.target.value)}
                    className="w-full px-3 py-2 text-sm border border-stone-200 rounded-xl focus:outline-none focus:border-stone-900"
                  />
                </div>
                <div>
                  <label className="text-xs font-medium text-stone-700 block mb-1">능동(분)</label>
                  <input
                    type="number" min="1"
                    value={activeTime}
                    onChange={e => setActiveTime(e.target.value)}
                    disabled={!parallel}
                    className="w-full px-3 py-2 text-sm border border-stone-200 rounded-xl focus:outline-none focus:border-stone-900 disabled:bg-stone-50 disabled:text-stone-400"
                  />
                </div>
              </div>
              <label className="flex items-center gap-2 p-2.5 bg-stone-50 rounded-xl cursor-pointer">
                <input
                  type="checkbox"
                  checked={parallel}
                  onChange={e => setParallel(e.target.checked)}
                  className="w-4 h-4"
                />
                <span className="text-sm">병렬 가능 (대기 시간에 다른 일 가능)</span>
              </label>
            </div>

            <div className="flex items-center gap-2 mt-5">
              <button
                onClick={onClose}
                className="flex-1 py-2.5 text-sm border border-stone-200 rounded-xl hover:bg-stone-50"
              >
                취소
              </button>
              <button
                onClick={handleSave}
                className="flex-1 py-2.5 text-sm bg-stone-900 text-white rounded-xl hover:bg-stone-800"
              >
                저장
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ========== 메인 앱 ==========
    function App() {
      const [apiKey, setApiKey] = useState(() => load(STORAGE.apiKey, ''));
      const [showApiKeyModal, setShowApiKeyModal] = useState(false);
      const [editTask, setEditTask] = useState(null);

      const initialMeta = load(STORAGE.meta, { startMode: 'now', startTime: '09:00', view: 'timeline' });
      const [view, setView] = useState(initialMeta.view);
      const [startMode, setStartMode] = useState(initialMeta.startMode);
      const [startTime, setStartTime] = useState(initialMeta.startTime);

      const [rawInput, setRawInput] = useState('');
      const [tasks, setTasks] = useState(() => load(STORAGE.tasks, []));
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      // 자동 저장
      useEffect(() => { save(STORAGE.tasks, tasks); }, [tasks]);
      useEffect(() => { save(STORAGE.meta, { startMode, startTime, view }); }, [startMode, startTime, view]);
      useEffect(() => { save(STORAGE.apiKey, apiKey); }, [apiKey]);

      // 첫 방문이면 키 모달 안내
      useEffect(() => {
        if (!apiKey) {
          const timer = setTimeout(() => setShowApiKeyModal(true), 500);
          return () => clearTimeout(timer);
        }
      }, []);

      const handleAnalyze = async () => {
        if (!apiKey) { setShowApiKeyModal(true); return; }
        if (!rawInput.trim()) { setError('할 일을 먼저 입력해주세요'); return; }

        setLoading(true);
        setError('');
        try {
          const result = await analyzeTasks(rawInput, apiKey);
          setTasks(result);
          setRawInput('');
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      };

      const cycleStatus = (id) => {
        setTasks(tasks.map(t => {
          if (t.id !== id) return t;
          const next = { todo: 'doing', doing: 'done', done: 'todo' }[t.status];
          return { ...t, status: next };
        }));
      };

      const removeTask = (id) => setTasks(tasks.filter(t => t.id !== id));
      const updateTask = (updated) => setTasks(tasks.map(t => t.id === updated.id ? updated : t));
      const clearAll = () => {
        if (confirm('모든 일정을 지울까요?')) setTasks([]);
      };

      const totalDuration = tasks.length === 0 ? 0 : Math.max(...tasks.map(t => t.startMin + t.duration));
      const baseTime = getBaseTime(startMode, startTime);

      const statusConfig = {
        done:  { label: '완료',   Icon: IconCheck,  bar: 'bg-stone-300', text: 'text-stone-400 line-through', iconColor: 'text-stone-300' },
        doing: { label: '진행중', Icon: IconPlay,   bar: 'bg-emerald-500', text: 'text-stone-900 font-medium', iconColor: 'text-emerald-500' },
        todo:  { label: '예정',   Icon: IconCircle, bar: 'bg-stone-800', text: 'text-stone-700', iconColor: 'text-stone-400' },
      };

      const counts = {
        done: tasks.filter(t => t.status === 'done').length,
        doing: tasks.filter(t => t.status === 'doing').length,
        todo: tasks.filter(t => t.status === 'todo').length,
      };

      return (
        <div className="min-h-screen bg-stone-50">
          {/* 상단 네비 */}
          <nav className="bg-white border-b border-stone-200 sticky top-0 z-20">
            <div className="max-w-5xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <div className="w-7 h-7 rounded-md bg-stone-900 flex items-center justify-center">
                  <span className="text-white text-xs font-bold tracking-tight">L</span>
                </div>
                <div>
                  <div className="text-sm font-semibold text-stone-900 tracking-tight leading-none">LUPL Planner</div>
                  <div className="text-[10px] text-stone-400 leading-none mt-0.5">AI 일정 정리</div>
                </div>
              </div>
              <button
                onClick={() => setShowApiKeyModal(true)}
                className="p-2 hover:bg-stone-100 rounded-lg text-stone-600"
                title="설정"
              >
                <IconSettings className="w-4 h-4" />
              </button>
            </div>
          </nav>

          <div className="max-w-5xl mx-auto px-4 sm:px-6 py-5 sm:py-8">
            {/* 안내 (키 없을 때) */}
            {!apiKey && (
              <div className="mb-4 p-3 bg-amber-50 border border-amber-200 rounded-xl text-xs text-amber-800 flex items-center justify-between gap-2">
                <span>AI 분석을 쓰려면 OpenAI API 키 설정이 필요해요.</span>
                <button
                  onClick={() => setShowApiKeyModal(true)}
                  className="px-2.5 py-1 bg-amber-900 text-white rounded-md text-[11px] whitespace-nowrap"
                >
                  키 설정
                </button>
              </div>
            )}

            <div className="grid grid-cols-1 lg:grid-cols-5 gap-4 sm:gap-6">
              {/* 좌측: 입력 */}
              <section className="lg:col-span-2 bg-white rounded-2xl border border-stone-200 p-4 sm:p-5">
                <div className="flex items-center justify-between mb-3">
                  <h2 className="text-sm font-semibold text-stone-900">할 일 입력</h2>
                  <span className="text-xs text-stone-400">{rawInput.split('\n').filter(l => l.trim()).length}개</span>
                </div>
                <textarea
                  value={rawInput}
                  onChange={(e) => setRawInput(e.target.value)}
                  placeholder={"줄바꿈으로 구분해서 입력하세요\n예: 밥 짓기\n냉장고 청소\n빨래 돌리기"}
                  className="w-full h-36 sm:h-44 p-3 text-sm border border-stone-200 rounded-xl resize-none focus:outline-none focus:border-stone-900 bg-stone-50/50"
                />

                <div className="mt-4 space-y-2">
                  <label className="text-xs font-medium text-stone-700">시작 시간</label>
                  <div className="flex items-center gap-1 bg-stone-100 rounded-xl p-1">
                    <button
                      onClick={() => setStartMode('now')}
                      className={`flex-1 py-1.5 text-xs rounded-lg transition ${startMode === 'now' ? 'bg-white text-stone-900 shadow-sm font-medium' : 'text-stone-500'}`}
                    >지금 바로</button>
                    <button
                      onClick={() => setStartMode('scheduled')}
                      className={`flex-1 py-1.5 text-xs rounded-lg transition ${startMode === 'scheduled' ? 'bg-white text-stone-900 shadow-sm font-medium' : 'text-stone-500'}`}
                    >시간 지정</button>
                  </div>
                  {startMode === 'scheduled' && (
                    <input
                      type="time"
                      value={startTime}
                      onChange={(e) => setStartTime(e.target.value)}
                      className="w-full mt-2 px-3 py-2 text-sm border border-stone-200 rounded-xl focus:outline-none focus:border-stone-900"
                    />
                  )}
                </div>

                {error && (
                  <div className="mt-3 p-2.5 bg-red-50 border border-red-200 rounded-lg text-xs text-red-700">
                    {error}
                  </div>
                )}

                <button
                  onClick={handleAnalyze}
                  disabled={loading || !rawInput.trim()}
                  className="w-full mt-4 py-2.5 bg-stone-900 text-white rounded-xl text-sm font-medium hover:bg-stone-800 disabled:opacity-40 disabled:cursor-not-allowed transition flex items-center justify-center gap-1.5"
                >
                  {loading ? <><IconLoader className="w-4 h-4 animate-spin" />분석 중…</> : <><IconSparkles className="w-4 h-4" />AI로 분석하기</>}
                </button>

                <div className="mt-4 pt-4 border-t border-stone-100 flex items-center justify-between text-xs text-stone-500">
                  <div className="flex items-center gap-2">
                    <div className={`w-1.5 h-1.5 rounded-full ${apiKey ? 'bg-emerald-500' : 'bg-stone-300'}`} />
                    <span>{apiKey ? 'GPT-4o-mini 연결됨' : '키 미설정'}</span>
                  </div>
                  {tasks.length > 0 && (
                    <button onClick={clearAll} className="text-stone-400 hover:text-red-600 transition">
                      전체 삭제
                    </button>
                  )}
                </div>
              </section>

              {/* 우측: 결과 */}
              <section className="lg:col-span-3 bg-white rounded-2xl border border-stone-200 p-4 sm:p-5">
                <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
                  <div className="min-w-0">
                    <h2 className="text-sm font-semibold text-stone-900">정렬된 일정</h2>
                    {tasks.length > 0 ? (
                      <p className="text-xs text-stone-500 mt-0.5">
                        {formatTime(baseTime, 0)} 시작 · 총 {totalDuration}분
                        {totalDuration >= 60 && ` (${Math.floor(totalDuration/60)}시간 ${totalDuration%60}분)`}
                      </p>
                    ) : (
                      <p className="text-xs text-stone-500 mt-0.5">할 일을 입력하고 분석을 시작해주세요</p>
                    )}
                  </div>
                  {tasks.length > 0 && (
                    <div className="flex items-center gap-1 bg-stone-100 rounded-lg p-0.5">
                      <button
                        onClick={() => setView('timeline')}
                        className={`px-2.5 py-1.5 rounded-md text-xs flex items-center gap-1 transition ${view === 'timeline' ? 'bg-white text-stone-900 shadow-sm font-medium' : 'text-stone-500'}`}
                      ><IconChart className="w-3.5 h-3.5" />타임라인</button>
                      <button
                        onClick={() => setView('checklist')}
                        className={`px-2.5 py-1.5 rounded-md text-xs flex items-center gap-1 transition ${view === 'checklist' ? 'bg-white text-stone-900 shadow-sm font-medium' : 'text-stone-500'}`}
                      ><IconList className="w-3.5 h-3.5" />체크리스트</button>
                    </div>
                  )}
                </div>

                {/* 빈 상태 */}
                {tasks.length === 0 && (
                  <div className="py-12 text-center text-stone-400 text-sm">
                    <IconSparkles className="w-8 h-8 mx-auto mb-3 text-stone-300" />
                    아직 분석된 일정이 없어요
                    <div className="text-xs text-stone-300 mt-1">왼쪽에서 할 일을 입력해주세요</div>
                  </div>
                )}

                {/* 타임라인 뷰 */}
                {tasks.length > 0 && view === 'timeline' && (
                  <div className="space-y-2.5">
                    {/* 데스크톱 시간 눈금 */}
                    <div className="hidden sm:block relative h-5 ml-28 mr-1">
                      {[0, 0.25, 0.5, 0.75, 1].map((pct) => (
                        <div key={pct} className="absolute top-0 text-[10px] text-stone-400" style={{ left: `${pct * 100}%`, transform: 'translateX(-50%)' }}>
                          {formatTime(baseTime, Math.round(totalDuration * pct))}
                        </div>
                      ))}
                    </div>
                    {/* 모바일 시간 눈금 */}
                    <div className="sm:hidden flex justify-between text-[10px] text-stone-400 px-1 mb-1">
                      <span>{formatTime(baseTime, 0)}</span>
                      <span>{formatTime(baseTime, Math.round(totalDuration / 2))}</span>
                      <span>{formatTime(baseTime, totalDuration)}</span>
                    </div>

                    {tasks.map((task) => {
                      const cfg = statusConfig[task.status];
                      const leftPct = (task.startMin / totalDuration) * 100;
                      const widthPct = (task.duration / totalDuration) * 100;
                      const activePct = (task.activeTime / task.duration) * 100;

                      return (
                        <div key={task.id} className="group">
                          {/* 모바일: 위에 작업명 */}
                          <div className="sm:hidden flex items-center justify-between mb-1 px-1">
                            <button onClick={() => cycleStatus(task.id)} className="flex items-center gap-1.5 min-w-0 flex-1">
                              <cfg.Icon className={`w-3.5 h-3.5 shrink-0 ${cfg.iconColor}`} />
                              <span className={`text-xs truncate ${cfg.text}`}>{task.name}</span>
                              {task.parallel && <span className="text-[9px] text-emerald-600 font-medium shrink-0">⇅ 병렬</span>}
                            </button>
                            <button onClick={() => setEditTask(task)} className="text-[10px] text-stone-400 px-1.5 py-0.5 hover:text-stone-700">수정</button>
                          </div>

                          {/* 데스크톱: 가로 정렬 */}
                          <div className="flex items-center gap-3">
                            <button onClick={() => cycleStatus(task.id)} className="hidden sm:flex w-28 shrink-0 text-left text-sm items-center gap-1.5">
                              <cfg.Icon className={`w-3.5 h-3.5 shrink-0 ${cfg.iconColor}`} />
                              <span className={`truncate ${cfg.text}`}>{task.name}</span>
                            </button>

                            <div className="flex-1 relative h-7 bg-stone-100/70 rounded-md overflow-hidden">
                              <div
                                className={`absolute top-0 h-full rounded-md ${cfg.bar} ${task.status === 'done' ? 'opacity-40' : ''}`}
                                style={{ left: `${leftPct}%`, width: `${widthPct}%` }}
                              >
                                {task.parallel && task.status !== 'done' && (
                                  <div
                                    className="absolute top-0 h-full bg-stone-900/70 rounded-l-md"
                                    style={{ width: `${activePct}%` }}
                                  />
                                )}
                                <span className="absolute inset-0 flex items-center px-2 text-[11px] sm:text-xs text-white font-medium">
                                  {task.duration}분
                                </span>
                              </div>
                              {task.parallel && (
                                <span className="hidden sm:block absolute -top-1 text-[9px] text-emerald-600 font-medium" style={{ left: `${leftPct}%` }}>
                                  ⇅ 병렬
                                </span>
                              )}
                            </div>
                          </div>
                        </div>
                      );
                    })}

                    <div className="flex flex-wrap items-center gap-3 pt-3 mt-3 border-t border-stone-100 text-[11px] text-stone-500">
                      <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-sm bg-stone-900" />능동 시간</div>
                      <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-sm bg-stone-300" />대기 (병렬 가능)</div>
                      <div className="flex items-center gap-1.5"><IconPlay className="w-3 h-3 text-emerald-500" />진행중</div>
                    </div>
                  </div>
                )}

                {/* 체크리스트 뷰 */}
                {tasks.length > 0 && view === 'checklist' && (
                  <div className="space-y-2">
                    {tasks.map((task, idx) => {
                      const cfg = statusConfig[task.status];
                      return (
                        <div key={task.id} className="group flex items-center gap-3 p-3 rounded-xl border border-stone-100 hover:border-stone-200 hover:bg-stone-50/50 transition">
                          <button onClick={() => cycleStatus(task.id)} className="shrink-0">
                            <cfg.Icon className={`w-5 h-5 ${cfg.iconColor}`} />
                          </button>
                          <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-2 flex-wrap">
                              <span className="text-[10px] text-stone-400 font-mono">#{idx + 1}</span>
                              <span className={`text-sm ${cfg.text}`}>{task.name}</span>
                              {task.parallel && <span className="text-[10px] px-1.5 py-0.5 bg-emerald-50 text-emerald-700 rounded font-medium">병렬</span>}
                            </div>
                            <div className="flex items-center gap-2 mt-1 text-[11px] text-stone-500 flex-wrap">
                              <IconClock className="w-3 h-3" />
                              <span>{formatTime(baseTime, task.startMin)} – {formatTime(baseTime, task.startMin + task.duration)}</span>
                              <span className="text-stone-300">·</span>
                              <span>{task.duration}분</span>
                              {task.parallel && task.activeTime !== task.duration && (
                                <><span className="text-stone-300">·</span><span>능동 {task.activeTime}분</span></>
                              )}
                            </div>
                          </div>
                          <div className="flex items-center gap-1 shrink-0">
                            <button onClick={() => setEditTask(task)} className="px-2 py-1.5 text-xs text-stone-500 hover:bg-stone-100 rounded-lg" title="수정">수정</button>
                            <button onClick={() => removeTask(task.id)} className="p-1.5 text-stone-400 hover:text-red-600 hover:bg-red-50 rounded-lg" title="삭제">
                              <IconTrash className="w-3.5 h-3.5" />
                            </button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* 통계 */}
                {tasks.length > 0 && (
                  <div className="mt-5 pt-4 border-t border-stone-100 grid grid-cols-3 gap-3 text-center">
                    <div>
                      <div className="text-lg font-bold text-stone-900">{counts.done}</div>
                      <div className="text-[10px] text-stone-500 uppercase tracking-wider">완료</div>
                    </div>
                    <div>
                      <div className="text-lg font-bold text-emerald-600">{counts.doing}</div>
                      <div className="text-[10px] text-stone-500 uppercase tracking-wider">진행중</div>
                    </div>
                    <div>
                      <div className="text-lg font-bold text-stone-900">{counts.todo}</div>
                      <div className="text-[10px] text-stone-500 uppercase tracking-wider">예정</div>
                    </div>
                  </div>
                )}
              </section>
            </div>

            <footer className="mt-6 text-center text-[11px] text-stone-400">
              LUPL Planner · 데이터는 이 브라우저에 저장됩니다
            </footer>
          </div>

          <ApiKeyModal
            open={showApiKeyModal}
            onClose={() => setShowApiKeyModal(false)}
            onSave={setApiKey}
            currentKey={apiKey}
          />
          <EditTaskModal
            task={editTask}
            onClose={() => setEditTask(null)}
            onSave={updateTask}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

</body>
</html>
